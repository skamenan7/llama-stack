[project]
name = "ogx-provider-kaze"
version = "0.1.0"
description = "Kaze weather provider for OGX"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["ogx", "pydantic", "aiohttp"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["ogx_provider_kaze", "ogx_provider_kaze.*"]
