[project]
name = "ogx-api-weather"
version = "0.1.0"
description = "Weather API for OGX"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["ogx", "pydantic"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["ogx_api_weather", "ogx_api_weather.*"]
