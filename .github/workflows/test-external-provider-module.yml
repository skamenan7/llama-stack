name: Test External Providers Installed via Module

run-name: Test External Provider installation via Python module

# Disabled until we find a suitable external provider for CI.
# The lmeval provider depends on the eval API which is being removed.
on:
  workflow_dispatch: {}

jobs:
  test-external-providers-from-module:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/setup-runner

      - name: Install weather external API and kaze provider
        run: |
          uv pip install tests/external/ogx-api-weather
          uv pip install tests/external/ogx-provider-kaze

      - name: Configure external API and provider
        run: |
          mkdir -p ~/.ogx/apis.d ~/.ogx/providers.d
          cp tests/external/weather.yaml ~/.ogx/apis.d/
          cp tests/external/kaze.yaml ~/.ogx/providers.d/

      - name: Start OGX server in background
        env:
          OGX_LOG_FILE: "server.log"
        run: |
          nohup uv run ogx stack run tests/external/config.yaml > server.log 2>&1 &

      - name: Wait for OGX server to be ready
        run: |
          for _ in {1..30}; do
            if curl -s http://localhost:8321/v1/health | grep -q "OK"; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 1
          done
          echo "Server failed to start"
          cat server.log
          exit 1

      - name: Verify external provider is loaded
        run: |
          response=$(curl -s http://localhost:8321/v1/providers)
          echo "$response" | python3 -m json.tool
          if echo "$response" | grep -q "kaze"; then
            echo "kaze external provider loaded successfully"
          else
            echo "ERROR: kaze provider not found in providers list"
            exit 1
          fi

      - name: Upload all logs to artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ github.run_id }}-${{ github.run_attempt }}-external-provider-module-test
          path: |
            *.log
          retention-days: 1
